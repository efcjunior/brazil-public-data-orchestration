name: brazil-public-data

services:
  auth-mongo:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "${AUTH_MONGO_PORT:-27018}:27017"
    volumes:
      - auth-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  bdi-mongo:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "${BDI_MONGO_PORT:-27019}:27017"
    volumes:
      - bdi-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-api:
    build:
      context: ../auth-api
    depends_on:
      auth-mongo:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: local
      MONGODB_URI: mongodb://auth-mongo:27017/auth-api
      SPRING_MONGODB_URI: mongodb://auth-mongo:27017/auth-api
      JWT_ISSUER: ${JWT_ISSUER:-http://auth-api:8080}
      JWT_ALLOWED_AUDIENCES: ${JWT_ALLOWED_AUDIENCES:-bdi-api,another-api}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-local-admin-password}
      AUTH_API_RATE_LIMIT_TRUST_FORWARDED_HEADERS: ${AUTH_API_RATE_LIMIT_TRUST_FORWARDED_HEADERS:-false}
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:-logstash}
    ports:
      - "${AUTH_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  bdi-api:
    build:
      context: ../bdi-api
    depends_on:
      bdi-mongo:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: local
      MONGODB_URI: mongodb://bdi-mongo:27017/bdi-api
      SPRING_MONGODB_URI: mongodb://bdi-mongo:27017/bdi-api
      AUTH_JWT_ISSUER: ${JWT_ISSUER:-http://auth-api:8080}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-bdi-api}
      AUTH_JWKS_URI: http://auth-api:8080/api/v1/auth/jwks
      BDI_API_RATE_LIMIT_TRUST_FORWARDED_HEADERS: ${BDI_API_RATE_LIMIT_TRUST_FORWARDED_HEADERS:-false}
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:-logstash}
    ports:
      - "${BDI_API_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  auth-mongo-data:
  bdi-mongo-data:
